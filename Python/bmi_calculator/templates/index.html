<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI計算器 - 健康體重管理</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 BMI 健康計算機</h1>
            <p>快速了解您的體重健康指數</p>
        </header>

        <main class="content">
            <form id="bmiForm" class="form-section">
                <div class="form-group">
                    <label for="height">身高（公分）</label>
                    <input 
                        type="number" 
                        id="height" 
                        name="height" 
                        placeholder="請輸入身高，例如: 170"
                        min="50" 
                        max="250"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="weight">體重（公斤）</label>
                    <input 
                        type="number" 
                        id="weight" 
                        name="weight" 
                        placeholder="請輸入體重，例如: 65"
                        min="20" 
                        max="300"
                        step="0.1"
                        required
                    >
                </div>

                <button type="submit" class="btn-submit">計算 BMI</button>
            </form>

            <div id="resultSection" class="result-section" style="display: none;">
                <div id="resultCard" class="result-card">
                    <h2>計算結果</h2>
                    <div class="bmi-display">
                        <span class="bmi-value" id="bmiValue">-</span>
                        <span class="bmi-unit">BMI</span>
                    </div>
                    <div class="classification">
                        <p class="category" id="category">-</p>
                        <p class="description" id="description">-</p>
                    </div>
                </div>
            </div>

            <div id="errorSection" class="error-section" style="display: none;">
                <p id="errorMessage"></p>
            </div>
        </main>

        <footer>
            <p>⚠️ 本計算機僅供參考，不能代替醫療建議。如有健康疑慮，請咨詢專業醫生。</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
